<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>The script element</h1>
    <p id="demo"></p>
    <script>
      let i = 0;
      for (let g = 1; g <= 1000; g++) {
        for (let d = 0; d <= g; d++) {
          if (g % d === 0) {
            i++;
          }
        }
        if (i <= 2) {
          console.log(g);
        }
        i = 0;
      }
    </script>
  </body>
</html>
