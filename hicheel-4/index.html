<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML & CSS Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Fixed header -->
    <div class="header">
      <h1>Student Practice Page</h1>
    </div>

    <!-- Sticky notice -->
    <div class="sticky-note">
      <p>This bar is sticky</p>
    </div>
    <br />

    <!-- Main container -->
    <div class="container">
      <!-- Profile card -->
      <div class="card">
        <img src="./pfp.jpg" alt="Profile Image" />

        <h1>John Doe</h1>

        <p>I am a <span class="highlight">web development</span> student.</p>
        <hr />

        <p>Leave a message:</p>
        <input type="text" placeholder="Type here..." />
        <br /><br />
        <button>Submit</button>
      </div>

      <!-- Relative + absolute example -->
      <div class="box">
        <p>This box is relative</p>
        <div class="absolute-box">Absolute</div>
      </div>
    </div>

    <!-- Fixed button -->
    <button class="fixed-button">Help</button>
  </body>
</html>
